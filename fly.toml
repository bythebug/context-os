# fly.toml — ContextOS deployment config
# Deploy with: fly deploy

app = "contextos"
primary_region = "iad"

[build]

[env]
  PORT = "8000"
  EMBEDDING_PROVIDER = "local"
  EMBEDDING_MODEL = "all-MiniLM-L6-v2"
  EMBEDDING_DIMENSIONS = "384"
  EXTRACTION_PROVIDER = "anthropic"   # set ANTHROPIC_API_KEY via: fly secrets set ANTHROPIC_API_KEY=...

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
